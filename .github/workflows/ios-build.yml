name: iOS Build & TestFlight Deploy

# يُشغَّل تلقائياً عند كل push لفرع main، أو يدوياً من تبويب Actions
on:
  push:
    branches: [main]
    paths:
      - 'ios-app/**'          # عدّل هذا المسار حسب مكان مشروع iOS داخل الريبو
  workflow_dispatch: {}       # يسمح بتشغيل يدوي بزر واحد من واجهة GitHub

jobs:
  build-and-deploy:
    runs-on: macos-14         # يحجز جهاز Mac افتراضي (macOS Sonoma) تلقائياً
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj from project.yml
        run: |
          cd ios-app
          xcodegen generate
          # هذي الخطوة تولّد ARCodeCaptureApp.xcodeproj من project.yml تلقائياً
          # المطور ما يحتاج يفتح Xcode أبداً ولا حتى يمتلك ملف .xcodeproj بالريبو -
          # فقط يكتب/يعدّل project.yml وملفات Swift، والباقي يصير هنا.

      - name: Install Fastlane
        run: |
          cd ios-app
          gem install bundler
          bundle install

      - name: Decrypt signing certificates (Fastlane Match)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios-app
          bundle exec fastlane match appstore --readonly

      - name: Run unit tests (non-Object-Capture logic only)
        run: |
          cd ios-app
          xcodebuild test \
            -workspace ARCodeCaptureApp.xcworkspace \
            -scheme ARCodeCaptureApp \
            -destination 'platform=iOS Simulator,name=iPhone 15'
        continue-on-error: true   # Object Capture APIs تفشل بالمحاكي، اجعلها تحذير لا فشل قاتل

      - name: Build and archive
        run: |
          cd ios-app
          bundle exec fastlane build_release

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd ios-app
          bundle exec fastlane upload_testflight

      - name: Upload IPA as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARCodeCaptureApp-ipa
          path: ios-app/build/*.ipa
          retention-days: 30
